name: pr-light
on:
  pull_request:
jobs:
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ninja-build
          version: 1.0
      - run: cmake --version
      - run: python -m pip install --upgrade pip "conan==2.9.2"
      - run: conan --version
      - run: conan profile detect --force
      - run: conan install . --output-folder=build --build=missing -s build_type=Release
      - run: cmake --preset conan-release
      - run: cmake --build --preset conan-release
      - run: ctest --preset conan-release --output-on-failure
      - run: docker compose -f deploy/compose/docker-compose.arm64.yml --env-file deploy/env/http-server.arm64.env config
